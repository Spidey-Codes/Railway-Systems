name: Railway Washroom – Auto Predict

on:
  schedule:
    - cron: "*/5 * * * *"   # Every 10 minutes
  workflow_dispatch:           # Also allows manual trigger from GitHub UI

jobs:
  predict:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install pandas scikit-learn joblib numpy gspread \
                      google-auth firebase-admin openpyxl

      - name: Run prediction
        env:
          FIREBASE_KEY: ${{ secrets.FIREBASE_KEY }}
          GSHEETS_KEY:  ${{ secrets.GSHEETS_KEY }}
        run: python cloud_predict.py
