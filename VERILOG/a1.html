<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>My Valentine 💖</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Confetti Library -->
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

  <style>
    body {
      margin: 0;
      height: 100vh;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #ff4e8a, #ff9a9e);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      transition: background 1.2s ease;
    }

    .card {
      background: white;
      padding: 30px;
      border-radius: 25px;
      text-align: center;
      width: 92%;
      max-width: 420px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.25);
      z-index: 5;
      transition: 1s;
    }

    h1 {
      color: #ff4e8a;
    }

    h2 {
      color: #333;
    }

    p {
      color: #555;
    }

    .buttons {
      margin-top: 20px;
      position: relative;
      height: 70px;
    }

    button {
      padding: 12px 24px;
      font-size: 17px;
      border: none;
      border-radius: 30px;
      cursor: pointer;
      position: absolute;
    }

    #yes {
      background: #ff4e8a;
      color: white;
      left: 30px;
    }

    #no {
      background: #ddd;
      color: #333;
      right: 30px;
    }

    .final {
      position: fixed;
      inset: 0;
      background: radial-gradient(circle, #ff2f6d, #ff85a2);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      color: white;
      text-align: center;
      font-size: 32px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 1.5s ease;
      z-index: 10;
    }

    .final.show {
      opacity: 1;
      pointer-events: auto;
    }

    .final span {
      font-size: 70px;
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
      50% {
        transform: scale(1.15);
      }
    }
  </style>
</head>

<body>

  <div class="card" id="card">
    <h1>Hey My Rere ❤️</h1>
    <p>You are my favorite place to be in this whole wide world✨</p>
    <h2>Will you be my Valentine for now and forever? 💖</h2>

    <div class="buttons">
      <button id="yes" aria-colcount="">Yes 💍</button>
      <button id="no">No 🥺</button>
    </div>
  </div>

    <div class="final" id="final">
    <span>💖</span>
        <div id="slideshow">
        <img src="photo1.jpg" class="slide active">
        <img src="photo2.jpg" class="slide">
        <img src="photo3.jpg" class="slide">
    </div>

    <p id="typingText"></p>

<script>
const yesBtn = document.getElementById("yes");
const noBtn  = document.getElementById("no");
const card   = document.getElementById("card");
const final  = document.getElementById("final");

// Romantic music 🎵 (royalty-free)
const music = new Audio("https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3");
music.loop = true;

const messages = [
    "Wrong ans baby 🥺",
    "Baby Yaar? 😢",
    "Last chance darling 😭",
    "Okay fine... YES it is? 😘"
];

let noCount = 0;

// NO button escapes 😈
noBtn.addEventListener("mouseover", () => { 
      noBtn.style.transform = `translate(${Math.random() * 250 - 125}px,${Math.random() * 200 - 100}px)`; });

// Firework presets 🎆
function fireworkBurst(x, y) {
  confetti({
    particleCount: 120,
    spread: 90,
    startVelocity: 45,
    gravity: 0.9,
    scalar: 1.1,
    origin: { x, y }
  });
}

// Heart explosion for NO 💔➡️💖
function heartExplosion(x, y) {
  confetti({
    particleCount: 80,
    spread: 70,
    startVelocity: 35,
    gravity: 0.6,
    scalar: 1.2,
    colors: ['#ff4e8a', '#ff85a2', '#ffffff'],
    origin: { x, y }
  });
}

// If NO clicked
noBtn.addEventListener("click", (e) => {
  if (noCount < messages.length) {
    yesBtn.innerText = messages[noCount];
    yesBtn.style.transform = `scale(${1.1 + noCount * 0.15})`;
  }

  noCount++;

  if (noCount >= 4) {
    const rect = noBtn.getBoundingClientRect();
    heartExplosion(
      rect.left / window.innerWidth,
      rect.top / window.innerHeight
    );

    noBtn.style.opacity = "0";
    noBtn.style.pointerEvents = "none";

    yesBtn.classList.add("glow-bounce");
  }
});

// YES CLICK = CINEMA 🎬
yesBtn.addEventListener("click", () => {
  card.style.opacity = "0";
  card.style.transform = "scale(0.6)";
  document.body.style.background = "#000";

  final.classList.add("show");

  // Play romantic music 🎵
  music.play().catch(() => {});

  for (let i = 0; i < 8; i++) {
    fireworkBurst(Math.random(), Math.random() * 0.6);
  }

  const interval = setInterval(() => {
    fireworkBurst(Math.random(), Math.random() * 0.7);
  }, 700);

  setTimeout(() => clearInterval(interval), 15000);
});
// Slideshow logic 📸
const slides = document.querySelectorAll(".slide");
let slideIndex = 0;

function startSlideshow() {
  setInterval(() => {
    slides[slideIndex].classList.remove("active");
    slideIndex = (slideIndex + 1) % slides.length;
    slides[slideIndex].classList.add("active");
  }, 2000);
}

// Typing animation ✍️
const lines = [
  "YAYYYY!!! 🥰",
  "I knew you would hehe 😘",
  "I love You my Rere 💕",
  "Happy Valentine’s Day Rrishanee ❤️"
];

const loveMessage = lines.join("\n");

let charIndex = 0;
const typingEl = document.getElementById("typingText");

function startTyping() {
  typingEl.innerHTML = "";
  charIndex = 0;

  const typingInterval = setInterval(() => {
    const current = loveMessage
      .slice(0, charIndex + 1)
      .replace(/\n/g, "<br>");

    typingEl.innerHTML = current;
    charIndex++;

    if (charIndex === loveMessage.length) {
      clearInterval(typingInterval);
    }
  }, 50);
}


// Rose petals falling 🌹
function createPetal() {
  const petal = document.createElement("div");
  petal.classList.add("petal");
  petal.innerText = "🌹";
  petal.style.left = Math.random() * 100 + "vw";
  petal.style.animationDuration = 4 + Math.random() * 4 + "s";
  document.body.appendChild(petal);

  setTimeout(() => petal.remove(), 8000);
}

function startPetals() {
  setInterval(createPetal, 400);
}

/* Hook into YES click */
yesBtn.addEventListener("click", () => {
  startSlideshow();
  startTyping();
  startPetals();
});
</script>
</body>

</html>
