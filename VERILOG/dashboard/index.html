        import { initializeApp }

        // Firebase Configuration

         const firebaseConfig = {

            apiKey: "AIzaSyBr8CZmiVS0ge55eyIoeK99NuYRrm9PdZw",

            appId: "1:62126136918:web:b73af09a7ab47a7a0125f7"

        };



        // Initialize Firebase

        const app = initializeApp(firebaseConfig);

        const database = getDatabase(app);



        // Reference to Sensor Node

        const sensorRef = ref(database, 'Sensor');



        // Realtime Reading

        onValue(sensorRef, (snapshot) => {

    const data = snapshot.val();

    if(data){

        document.getElementById("airQuality").innerHTML =
            data["AirQuality"] + " ppm";

        document.getElementById("time").innerHTML =
            data.LastUpdated;
    }

});
let dataLog = [];

function updateData(ppm) {
    let now = new Date().toLocaleTimeString();

    dataLog.push({
        time: now,
        airQuality: ppm
    });
}

function downloadCSV() {
    let csv = "Time,Air Quality\n";

    dataLog.forEach(row => {
        csv += `${row.time},${row.airQuality}\n`;
    });

    let blob = new Blob([csv], { type: "text/csv" });
    let a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "air_quality_log.csv";
    a.click();
}
<button onclick="downloadCSV()">Download CSV</button>
